name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject config.js from secret
        run: |
          cat > js/config.js << 'TMPL'
          /* Site configuration — generated at deploy time */
          const SITE_CONFIG = {
            whatsappNumber: 'PLACEHOLDER'
          };
          TMPL
          sed -i "s/PLACEHOLDER/${{ secrets.WHATSAPP_NUMBER }}/" js/config.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
